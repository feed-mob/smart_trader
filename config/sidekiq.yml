# Sidekiq Server Configuration
# This file configures the Sidekiq worker process

# Concurrency: number of threads per process
# Can be overridden by SIDEKIQ_CONCURRENCY environment variable
:concurrency: 5

# Queue priorities and concurrency limits
:queues:
  - default
  - asset_collection
  - mailers
  - yahoo_finance

# Logging
:logfile: ./log/sidekiq.log
:log_format: json

# PID file location (for monitoring)
:pidfile: ./tmp/pids/sidekiq.pid

# Process timeout in seconds
:timeout: 30

# Sidekiq-Scheduler Configuration
:scheduler:
  :listened_queues_only: true
  :dynamic: true

# Schedule definitions (loaded by sidekiq-scheduler)
:schedule:
  # 因子计算 - 每小时执行（资产拉取后15分钟）
  factor_calculation:
    cron: "15 * * * *"
    class: "CalculateFactorsJob"
    queue: default
    description: "每小时计算交易因子"

  fetch_asset:
    cron: "15 * * * *"
    class: "AssetDataCollectionJob"
    queue: default
    description: "get assets"

  # CoinGecko 市场数据拉取 - 每天 UTC 02:00 和 23:00 执行
  fetch_coin_markets:
    cron: "0 2,23 * * *"
    class: "FetchCoinMarketsJob"
    queue: default
    description: "每天拉取 CoinGecko Layer-1 币种市场数据（市值前 100）"

  # Yahoo Finance 股票数据拉取 - 每天 UTC 02:00 执行
  fetch_yahoo_stock_data:
    cron: "0 2 * * *"
    class: "FetchYahooStockDataJob"
    queue: yahoo_finance
    description: "每天拉取 Yahoo Finance Market Cap 前 100 股票数据"
