# Sidekiq Cron Schedule Configuration
# This file defines recurring background jobs

# Asset Data Collection - Run every 4 hours
asset_data_collection:
  cron: "0 */4 * * *"  # Every 4 hours at minute 0
  class: "AssetDataCollectionJob"
  queue: default
  description: "Collect market data for top 10 assets by volume"

# Alternative schedules (uncomment to use):

